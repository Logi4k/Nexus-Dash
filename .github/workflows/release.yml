name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure signing and updater env
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=${TAURI_SIGNING_PRIVATE_KEY}" >> "$GITHUB_ENV"
            echo "Signing key configured"
          else
            echo "::warning::No signing key — build will not produce update artifacts"
          fi

          echo "TAURI_UPDATER_PUBKEY=dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDExMjc5MzZFMjcwNjhDRkEKUldUNmpBWW5icE1uRVdzT0NYdGNVbk92Tll6MjRZYkdGbmcvZllmMjVJc1pJUWl3enRnTmlBcWgK" >> "$GITHUB_ENV"
          echo "TAURI_UPDATER_ENDPOINTS=https://github.com/Logi4k/Nexus-Dash/releases/latest/download/latest.json" >> "$GITHUB_ENV"

      - name: Build Tauri app
        run: npm run tauri build
        shell: bash

      - name: Generate latest.json
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "=== NSIS directory ==="
          ls -la src-tauri/target/release/bundle/nsis/ || true
          echo ""
          VERSION="${TAG#v}"
          npm run ota:desktop:latest -- --repo Logi4k/Nexus-Dash --version "$VERSION"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            release/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}