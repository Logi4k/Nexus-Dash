name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

# Only allow one concurrent deployment
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Set signing private key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "$TAURI_SIGNING_PRIVATE_KEY" > "$GITHUB_WORKSPACE/src-tauri/tauri.key"
            echo "TAURI_SIGNING_PRIVATE_KEY=$TAURI_SIGNING_PRIVATE_KEY" >> "$GITHUB_ENV"
            echo "Signing key configured"
          else
            echo "No signing key available - build will be unsigned"
          fi

      - name: Set updater config
        shell: bash
        run: |
          echo "TAURI_UPDATER_PUBKEY=dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDExMjc5MzZFMjcwNjhDRkEKUldUNmpBWW5icE1uRVdzT0NYdGNVbk92Tll6MjRZYkdGbmcvZllmMjVJc1pJUWl3enRnTmlBcWgK" >> "$GITHUB_ENV"
          echo "TAURI_UPDATER_ENDPOINTS=https://github.com/Logi4k/Nexus-Dash/releases/latest/download/latest.json" >> "$GITHUB_ENV"

      - name: Build Tauri app
        run: npm run tauri build
        shell: bash

      - name: Generate latest.json
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "=== NSIS directory contents ==="
          ls -la src-tauri/target/release/bundle/nsis/ || true
          echo "=== .sig files ==="
          find src-tauri/target/release/bundle/nsis/ -name '*.sig' -exec ls -la {} \; || true
          npm run ota:desktop:latest -- --repo Logi4k/Nexus-Dash --version "${TAG#v}"
        shell: bash

      - name: List built artifacts
        run: |
          echo "=== Built artifacts ==="
          ls -la src-tauri/target/release/bundle/nsis/
          echo ""
          echo "=== latest.json ==="
          cat release/latest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            release/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
