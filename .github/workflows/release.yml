name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

# Only allow one concurrent deployment
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Set signing private key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ("$env:TAURI_SIGNING_PRIVATE_KEY") {
            $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath "$env:GITHUB_WORKSPACE\src-tauri\tauri.key" -Encoding utf8
            echo "TAURI_SIGNING_PRIVATE_KEY=$env:TAURI_SIGNING_PRIVATE_KEY" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            echo "Signing key configured"
          } else {
            echo "No signing key available - build will be unsigned"
          }

      - name: Set updater config
        run: |
          echo "TAURI_UPDATER_PUBKEY=dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDExMjc5MzZFMjcwNjhDRkEKUldUNmpBWW5icE1uRVdzT0NYdGNVbk92Tll6MjRZYkdGbmcvZllmMjVJc1pJUWl3enRnTmlBcWgK" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "TAURI_UPDATER_ENDPOINTS=https://github.com/Logi4k/Nexus-Dash/releases/latest/download/latest.json" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Tauri app
        run: npm run tauri build
        shell: bash

      - name: Generate latest.json
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TAG: ${{ github.ref_name }}
        run: |
          npm run ota:desktop:latest -- --repo Logi4k/Nexus-Dash --version "${TAG#v}"
        shell: bash

      - name: List built artifacts
        run: |
          echo "=== Built artifacts ==="
          ls -la src-tauri/target/release/bundle/nsis/
          echo ""
          echo "=== latest.json ==="
          cat release/latest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            release/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
