name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure signing and updater env
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=${TAURI_SIGNING_PRIVATE_KEY}" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" >> "$GITHUB_ENV"
            echo "Signing key configured"
          else
            echo "::warning::No signing key — build will not produce update artifacts"
          fi

          echo "TAURI_UPDATER_PUBKEY=dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IEU2MTc3QzBERkUxNjI4QTcKUldTbktCYitEWHdYNXJkWTV4R0x5KzdmS3o5TU5QTEVOaVluZmRtTVEwcTF0QU9uZjB2RjliLzMK" >> "$GITHUB_ENV"
          echo "TAURI_UPDATER_ENDPOINTS=https://github.com/Logi4k/Nexus-Dash/releases/latest/download/latest.json" >> "$GITHUB_ENV"

      - name: Build Tauri app
        shell: bash
        env:
          # Injected into the Vite bundle at build time (add as repository secrets).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run tauri build

      - name: Generate latest.json
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "=== NSIS directory ==="
          ls -la src-tauri/target/release/bundle/nsis/ || true
          echo ""
          VERSION="${TAG#v}"
          npm run ota:desktop:latest -- --repo Logi4k/Nexus-Dash --version "$VERSION"

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p gh_release_files
          cp src-tauri/target/release/bundle/nsis/*-setup.exe gh_release_files/
          cp src-tauri/target/release/bundle/nsis/*-setup.exe.sig gh_release_files/
          cp release/latest.json gh_release_files/
          if compgen -G "src-tauri/target/release/bundle/msi/*.msi" > /dev/null 2>&1; then
            for f in src-tauri/target/release/bundle/msi/*.msi; do
              cp "$f" gh_release_files/
              if [ -f "${f}.sig" ]; then cp "${f}.sig" gh_release_files/; fi
            done
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: gh_release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
