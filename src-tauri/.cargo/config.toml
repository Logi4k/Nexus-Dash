# Optional: only needed if you build the Windows *GNU* target explicitly.
# Default MSVC builds ignore this section.
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
rustflags = [
  "-C", "linker=clang",
  "-C", "link-arg=-fuse-ld=lld-link",
  "-C", "link-arg=--target=x86_64-pc-windows-msvc"
]

# Do not set NODE here — a Linux path breaks `tauri android` / builds on Windows.
#
# Windows + Android: `ring` / `cc` look for unversioned `*-linux-android-clang`.
# The NDK only ships API-suffixed names; repo-local wrappers in `tools/android-wrappers`
# forward to API 24. Run builds via `npm run android:build` so NDK `bin` is also on PATH.
[target.aarch64-linux-android]
linker = "../tools/android-wrappers/aarch64-linux-android-clang.cmd"

[target.armv7-linux-androideabi]
linker = "../tools/android-wrappers/armv7-linux-androideabi-clang.cmd"

[target.i686-linux-android]
linker = "../tools/android-wrappers/i686-linux-android-clang.cmd"

[target.x86_64-linux-android]
linker = "../tools/android-wrappers/x86_64-linux-android-clang.cmd"
